<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo con gradiente de la marca -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#023367"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="brain-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Cerebro: hemisferio izquierdo -->
  <path d="M18,28 C18,19 23,14 29,14 L29,42 C26,42 23,41 21,39 C19,37 18,33 18,28 Z"
        fill="none" stroke="url(#brain-grad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cerebro: hemisferio derecho -->
  <path d="M46,28 C46,19 41,14 35,14 L35,42 C38,42 41,41 43,39 C45,37 46,33 46,28 Z"
        fill="none" stroke="url(#brain-grad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Línea central (cuerpo calloso) -->
  <line x1="32" y1="14" x2="32" y2="42" stroke="#4caf50" stroke-width="1.4" stroke-dasharray="3,2.5" stroke-linecap="round"/>

  <!-- Surco izq superior -->
  <path d="M22,22 C25,22 27,25 24,27" fill="none" stroke="#4caf50" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Surco izq inferior -->
  <path d="M20,32 C23,31 25,34 22,36" fill="none" stroke="#4caf50" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Surco der superior -->
  <path d="M42,22 C39,22 37,25 40,27" fill="none" stroke="#00838f" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Surco der inferior -->
  <path d="M44,32 C41,31 39,34 42,36" fill="none" stroke="#00838f" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Corazón en la base del cerebro -->
  <path d="M32,52 C32,52 25,47 25,43 C25,40.5 27,39 29.5,40.5 C30.5,41.1 31.2,41.8 32,42.8 C32.8,41.8 33.5,41.1 34.5,40.5 C37,39 39,40.5 39,43 C39,47 32,52 32,52Z"
        fill="#e91e8c"/>

  <!-- Punto de conexión cerebro-corazón -->
  <circle cx="32" cy="42" r="1.5" fill="#4caf50"/>
</svg>
